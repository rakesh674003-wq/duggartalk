<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuggarTalk Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0F172A; color: white; font-family: sans-serif; }
        .card { background-color: #1E293B; border: none; color: white; }
        .profile-pic-container img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #FACC15; object-fit: cover; }
        .stats-box { display: flex; gap: 20px; justify-content: center; margin-top: 15px; }
        .edit-btn { background: #334155; padding: 8px 20px; border-radius: 10px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="menuOverlay" onclick="window.toggleMenu()" class="fixed inset-0 bg-black/50 hidden z-40"></div>

<div class="header flex justify-between items-center px-4 py-3 bg-[#1E293B]">
    <button onclick="window.toggleMenu()" class="text-white">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
    </button>
    <span class="font-bold">DuggarTalk Profile</span>
    <button onclick="window.location.href='index.html'" class="text-sm text-[#FACC15] font-bold">Home</button>
</div>

<div class="container mx-auto px-4 pb-24 max-w-md">
    
    <div id="profileHeader" class="card p-6 rounded-3xl mt-6 flex flex-col items-center text-center shadow-2xl">
        
        <div class="profile-pic-container relative">
    <img id="profileAvatar" src="https://via.placeholder.com/150" alt="User Sketch">
    <label for="profilePicInput" class="absolute bottom-0 right-0 bg-yellow-400 text-black w-8 h-8 rounded-full flex items-center justify-center cursor-pointer text-sm font-bold">
        📷
    </label>
    <input type="file" id="profilePicInput" accept="image/*" class="hidden" onchange="window.changeProfilePic(event)">
</div>


        <div class="mt-3">
            <span class="bg-[#22C55E] text-white text-xs font-black px-4 py-1.5 rounded-full border border-[#16A34A] shadow-lg shadow-green-500/20 uppercase tracking-tighter">
                ✓ Monetized
            </span>
        </div>

        <h2 id="profileName" class="text-white text-2xl font-bold mt-3">Name</h2>
        <p id="profileUsername" class="text-gray-400">@username</p>
        <p id="profilePhone" class="text-gray-300 mt-2">No Phone</p>
        <p id="profileAddress" class="text-gray-300">No Address</p>

        <div class="stats-box">
            <div class="bg-[#0F172A] px-4 py-2 rounded-2xl border border-gray-800">
                <strong id="followerCount" class="text-lg">0</strong><br>
                <small class="text-gray-500 uppercase text-[10px] font-bold">Followers</small>
            </div>
            <div class="bg-[#0F172A] px-4 py-2 rounded-2xl border border-gray-800">
                <strong id="followingCount" class="text-lg">0</strong><br>
                <small class="text-gray-500 uppercase text-[10px] font-bold">Following</small>
            </div>
        </div>

        <div class="flex gap-4 mt-4 justify-center w-full">
            

          <button onclick="window.openEditProfile()" class="edit-btn text-white bg-slate-700 hover:bg-slate-600 px-6 py-2 rounded-xl font-bold transition-all">
    ✏️ Edit Profile
</button>

            <button onclick="window.shareProfile()" class="bg-[#FACC15] text-black px-6 py-2 rounded-xl font-bold hover:bg-yellow-500 transition-all flex items-center gap-2 mt-4">
                <span>🔗</span> Share Profile
            </button>
        </div>

    </div>

    <div id="walletSection" class="bg-gradient-to-br from-[#1E293B] to-[#0F172A] p-6 rounded-3xl border border-gray-700 shadow-2xl mt-6">
        <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-3">
            <h3 class="text-white font-bold text-lg flex items-center gap-2">
                <span class="text-[#FACC15]">💰</span> My Earnings
            </h3>
            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Verified Wallet</span>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-[#0F172A]/80 p-4 rounded-2xl border border-gray-800 text-center">
                <p class="text-gray-500 text-[10px] uppercase font-bold tracking-tighter">Total Balance</p>
                <h4 class="text-2xl font-black text-white mt-1">₹<span id="totalEarnings">0.00</span></h4>
            </div>
            <div class="bg-[#0F172A]/80 p-4 rounded-2xl border border-gray-800 text-center">
                <p class="text-gray-500 text-[10px] uppercase font-bold tracking-tighter">Ad Views</p>
                <h4 class="text-2xl font-black text-white mt-1" id="adViews">0</h4>
            </div>
        </div>

        <button onclick="window.withdrawRequest()" class="w-full mt-5 bg-[#FACC15] hover:bg-[#EAB308] text-black font-black py-4 rounded-2xl transition-all active:scale-95 shadow-xl shadow-yellow-500/10 uppercase italic">
            Withdraw to Bank / UPI
        </button>
    </div>

</div>

<div class="bottom-nav" id="bottomNav">
    <div class="nav-item text-black font-bold" onclick="window.location.href='index.html'">🏠</div>
    <div class="nav-item text-black font-bold" onclick="window.location.href='index.html'">🎬</div>
    <div class="nav-item text-black font-bold" onclick="window.openChat()">💬</div>
    <div class="nav-item text-black font-bold">👤</div>
</div>


<div id="editProfileModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-[9999] p-4 text-left">
    <div class="bg-[#1E293B] p-6 rounded-2xl w-full max-w-sm border border-gray-700 shadow-2xl">
        
        <!-- Modal Header -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-yellow-400">Edit Profile</h2>
            <button onclick="window.closeEditProfile()" class="text-gray-400 text-2xl hover:text-white">&times;</button>
        </div>




<div class="space-y-4">
              <div>
                  <label class="block text-xs text-gray-400 mb-1">Full Name</label>
                  <input type="text" id="editNameInput" placeholder="Full Name" class="w-full p-3 rounded-xl bg-[#0F172A] border border-gray-700 text-white outline-none focus:border-yellow-400">
              </div>

              

<div>
    <label class="block text-xs text-gray-400 mb-1">Username</label>
    <div class="flex gap-2">
        <input type="text" id="editUsername" placeholder="Username" class="flex-1 p-3 rounded-xl bg-[#0F172A] border border-gray-700 text-white outline-none focus:border-yellow-400">
        <button type="button" onclick="window.checkUsernameAvailability()" class="bg-yellow-400 text-black px-4 rounded-xl font-bold text-xs hover:bg-yellow-500 whitespace-nowrap">Check</button>
    </div>
    <span id="usernameStatus" class="text-xs block mt-1 hidden"></span>
</div>

<div>
    <label class="block text-xs text-gray-400 mb-1">Mobile Number</label>
    <div class="flex gap-2">
        <input type="tel" id="editPhoneInput" placeholder="Mobile Number" class="flex-1 p-3 rounded-xl bg-[#0F172A] border border-gray-700 text-white outline-none focus:border-yellow-400">
        <button type="button" onclick="window.verifyMobileNumber()" class="bg-blue-500 text-white px-4 rounded-xl font-bold text-xs hover:bg-blue-600 whitespace-nowrap">Verify</button>
    </div>
    <span id="phoneStatus" class="text-xs block mt-1 hidden"></span>
</div>







              <div>
                  <label class="block text-xs text-gray-400 mb-1">Address</label>
                  <input type="text" id="editAddressInput" placeholder="Address" class="w-full p-3 rounded-xl bg-[#0F172A] border border-gray-700 text-white outline-none focus:border-yellow-400">
              </div>
          </div>

          <div class="flex gap-3 mt-6">
              <button onclick="window.closeEditProfile()" class="flex-1 bg-gray-700 text-white py-3 rounded-xl font-bold hover:bg-gray-600 transition-all">Cancel</button>
              <button onclick="window.saveProfile()" class="flex-1 bg-yellow-400 text-black py-3 rounded-xl font-bold hover:bg-yellow-300 transition-all">Save Changes</button>
          </div>
    </div>
</div>         





<script src="settings.js"></script>
<script type="module" src="app.js"></script>
<script type="module" src="messages.js"></script>
<script src="profile.js"></script>

</body>
</html>
